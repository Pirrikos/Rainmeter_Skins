[Rainmeter]
Update=1000
AccurateText=1

[Variables]
@Include=#@#Variables.inc
BtnSize=52
LabelHeight=16
BtnBlock=(#LabelHeight# + #BtnSize#)
BtnSpacing=10
Pad=10
IconSize=40
IconOffset=((#BtnSize# - #IconSize#) / 2)
BarWidth=(#Pad# * 2 + #BtnSize#)
BarHeight=(#Pad# + (#BtnBlock# + #BtnSpacing#) * 10 - #BtnSpacing# + #Pad#)
TabWidth=(#BarWidth# - #TabInsetVertical#)
TabX=((#BarWidth# - #TabWidth#) / 2)
TabY=(#BarHeight# - 1)

Block1Y=#Pad#
Block2Y=(#Pad# + #BtnBlock# + #BtnSpacing#)
Block3Y=(#Pad# + (#BtnBlock# + #BtnSpacing#) * 2)
Block4Y=(#Pad# + (#BtnBlock# + #BtnSpacing#) * 3)
Block5Y=(#Pad# + (#BtnBlock# + #BtnSpacing#) * 4)
Block6Y=(#Pad# + (#BtnBlock# + #BtnSpacing#) * 5)
Block7Y=(#Pad# + (#BtnBlock# + #BtnSpacing#) * 6)
Block8Y=(#Pad# + (#BtnBlock# + #BtnSpacing#) * 7)
Block9Y=(#Pad# + (#BtnBlock# + #BtnSpacing#) * 8)
Block10Y=(#Pad# + (#BtnBlock# + #BtnSpacing#) * 9)

; ============================================
; BACKGROUND (transparent)
; ============================================

[MeterBarBg]
Meter=Shape
Shape=Rectangle 0,0,#BarWidth#,#BarHeight#,12 | Fill Color 0,0,0,0 | StrokeWidth 0

; ============================================
; BTN 1 - ALEXIA | Alexia Familia — teal 82,158,189
; ============================================

[MeterNotasBg]
Meter=Shape
X=#Pad#
Y=#Block1Y#
Shape=Rectangle 0,0,#BtnSize#,#BtnSize#,10 | Fill Color 82,158,189,255 | StrokeWidth 0

[MeterNotasIcon]
Meter=Image
ImageName=#@#icons/notes.png
X=(#Pad# + #IconOffset#)
Y=(#Block1Y# + #IconOffset#)
W=#IconSize#
H=#IconSize#

[MeterNotasLabel]
Meter=String
X=(#BarWidth# / 2)
Y=(#Block1Y# + #BtnSize# + 2)
FontFace=#FontBody#
FontSize=8
FontColor=255,255,255,220
StringAlign=CenterTop
AntiAlias=1
StringEffect=Shadow
FontEffectColor=0,0,0,180
Text=Alexia

[MeterNotasHit]
Meter=Shape
X=#Pad#
Y=#Block1Y#
Shape=Rectangle 0,0,#BtnSize#,(#LabelHeight# + #BtnSize#),10 | Fill Color 255,255,255,0 | StrokeWidth 0
LeftMouseUpAction=["chrome.exe" "https://luyferivas.com/new/"]
MouseOverAction=[!SetOption MeterNotasBg Shape "Rectangle 0,0,#BtnSize#,#BtnSize#,10 | Fill Color 110,180,210,255 | StrokeWidth 0"][!UpdateMeter MeterNotasBg][!Redraw]
MouseLeaveAction=[!SetOption MeterNotasBg Shape "Rectangle 0,0,#BtnSize#,#BtnSize#,10 | Fill Color 82,158,189,255 | StrokeWidth 0"][!UpdateMeter MeterNotasBg][!Redraw]

[MeterSep1]
Meter=Shape
X=#Pad#
Y=(#Block2Y# - #BtnSpacing# / 2)
Shape=Rectangle 0,0,#BtnSize#,1,0 | Fill Color 255,255,255,15 | StrokeWidth 0

