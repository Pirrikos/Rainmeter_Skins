[Rainmeter]
Update=1000
AccurateText=1
OnRefreshAction=[!CommandMeasure MeasureLuaCountdown "Initialize()"]

[MeasureMidnight]
Measure=Time
Format=%d
OnChangeAction=[!CommandMeasure MeasureLuaCountdown "Refresh()"]

[Variables]
@Include=#@#Variables.inc
SkinWidth=340
SkinHeight=340

; --- STYLES ---

[StyleEventName]
FontFace=#FontBody#
FontSize=11
FontColor=#CdNameText#
StringAlign=Left
AntiAlias=1
ClipString=1
W=220
DynamicVariables=1

[StyleDaysLeft]
FontFace=#FontBody#
FontSize=12
FontWeight=700
FontColor=#CdDaysNormal#
StringAlign=Right
AntiAlias=1
DynamicVariables=1

[StyleRowHit]
Shape=Rectangle 0,-5,300,30,6 | Fill Color 0,0,0,0 | StrokeWidth 0
MouseOverAction=[!SetOption #CURRENTSECTION# Shape "Rectangle 0,-5,300,30,6 | Fill Color #CdRowHoverFill# | StrokeWidth 1 | Stroke Color #CdRowHoverStroke#"][!UpdateMeter #CURRENTSECTION#][!Redraw]
MouseLeaveAction=[!SetOption #CURRENTSECTION# Shape "Rectangle 0,-5,300,30,6 | Fill Color 0,0,0,0 | StrokeWidth 0"][!UpdateMeter #CURRENTSECTION#][!Redraw]

; --- MEASURES ---

[MeasureLuaCountdown]
Measure=Script
ScriptFile=#@#Countdown.lua
UpdateDivider=-1

; --- METERS ---

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,#SkinWidth#,#SkinHeight#,15 | Fill Color #ColorBackground# | StrokeWidth 1 | Stroke Color #ColorGlassBorder#

[MeterTitle]
Meter=String
FontFace=#FontHeader#
FontSize=11
FontWeight=700
FontColor=200,200,200
AntiAlias=1
X=(#SkinWidth#/2)
Y=25
StringAlign=Center
Text="CUENTA ATRAS"

[MeterSubtitle]
Meter=String
FontFace=#FontBody#
FontSize=8
FontColor=#CdTitleSub#
AntiAlias=1
X=(#SkinWidth#/2)
Y=42
StringAlign=Center
Text="PROXIMOS #MaxEvents# EVENTOS"
DynamicVariables=1

[MeterCountValue]
Meter=String
FontFace=#FontBody#
FontSize=9
FontWeight=700
FontColor=#CdCountText#
AntiAlias=1
X=(#SkinWidth#-#RightPad#)
Y=42
StringAlign=Right
Text="0 pendientes"
DynamicVariables=1

; --- APPS TOGGLE BUTTON (grid icon) ---
[MeterAppsToggle]
Meter=Shape
X=#LeftPad#
Y=#TopBarY#
Shape=Rectangle 0,0,7,7,1 | Fill Color #CdIconIdle# | StrokeWidth 0
Shape2=Rectangle 9,0,7,7,1 | Fill Color #CdIconIdle# | StrokeWidth 0
Shape3=Rectangle 0,9,7,7,1 | Fill Color #CdIconIdle# | StrokeWidth 0
Shape4=Rectangle 9,9,7,7,1 | Fill Color #CdIconIdle# | StrokeWidth 0
LeftMouseUpAction=[!ToggleConfig "QUICK_ACCESS\QuickButtons" "AntigraQuickButtons.ini"]
MouseOverAction=[!SetOption MeterAppsToggle Shape "Rectangle 0,0,7,7,1 | Fill Color #CdIconHover# | StrokeWidth 0"][!SetOption MeterAppsToggle Shape2 "Rectangle 9,0,7,7,1 | Fill Color #CdIconHover# | StrokeWidth 0"][!SetOption MeterAppsToggle Shape3 "Rectangle 0,9,7,7,1 | Fill Color #CdIconHover# | StrokeWidth 0"][!SetOption MeterAppsToggle Shape4 "Rectangle 9,9,7,7,1 | Fill Color #CdIconHover# | StrokeWidth 0"][!UpdateMeter *][!Redraw]
MouseLeaveAction=[!SetOption MeterAppsToggle Shape "Rectangle 0,0,7,7,1 | Fill Color #CdIconIdle# | StrokeWidth 0"][!SetOption MeterAppsToggle Shape2 "Rectangle 9,0,7,7,1 | Fill Color #CdIconIdle# | StrokeWidth 0"][!SetOption MeterAppsToggle Shape3 "Rectangle 0,9,7,7,1 | Fill Color #CdIconIdle# | StrokeWidth 0"][!SetOption MeterAppsToggle Shape4 "Rectangle 9,9,7,7,1 | Fill Color #CdIconIdle# | StrokeWidth 0"][!UpdateMeter *][!Redraw]

; --- Header line ---
[MeterHeaderLine]
Meter=Shape
Shape=Line 20,68,320,68 | Stroke Color 255,255,255,30 | StrokeWidth 1

[MeterEmptyState]
Meter=String
FontFace=#FontBody#
FontSize=10
FontColor=#CdNameSubtle#
AntiAlias=1
StringAlign=Center
X=(#SkinWidth#/2)
Y=(#RowStart#+#RowHeight#*3)
Text="Sin proximos eventos"
Hidden=1
DynamicVariables=1

; --- ROW 1 ---
[MeterRowBg1]
Meter=Shape
X=#LeftPad#
Y=#RowStart#
Shape=Rectangle 0,-5,300,30,6 | Fill Color #CdRowNormal# | StrokeWidth 0
Hidden=1
[MeterBullet1]
Meter=Shape
X=#LeftPad#
Y=#RowStart#
Shape=Rectangle 0,0,3,16 | Fill Color #ColorAccent# | StrokeWidth 0
Hidden=1
[MeterEventName1]
Meter=String
MeterStyle=StyleEventName
X=(#LeftPad#+12)
Y=0r
Hidden=1
[MeterDaysLeft1]
Meter=String
MeterStyle=StyleDaysLeft
X=(#SkinWidth#-#RightPad#)
Y=0r
Hidden=1
[MeterHit1]
Meter=Shape
MeterStyle=StyleRowHit
X=#LeftPad#
Y=#RowStart#
Hidden=1

