[Rainmeter]
Update=1000
BackgroundMode=1
DynamicWindowSize=1
AlwaysOnTop=0

[Variables]
; --- COLORES ---
ColorTexto=255,255,255,220
ColorTextoBajo=160,160,160
ColorContenedor=0,0,0,200

ColorEstudios=85,140,255
ColorLaboral=255,140,80
ColorCasa=100,220,140
ColorOcio=180,100,240
ColorEscritorio=80,200,240
ColorProgramas=120,220,100
ColorLibros=200,160,120
ColorExamenes=255,80,80
ColorProyectos=50,220,220
ColorGDrive=66,133,244
ColorKiller=255,60,60

; --- DIMENSIONES ---
PaddingExt=10
Ancho=125
Alto=38
Radio=15
Espacio=4
Fila2Y=(#PaddingExt# + #Alto# + #Espacio#)

; --- FUENTES ---
Fuente=Roboto
FuenteIconos=Segoe MDL2 Assets
TamFuente=10
TamIcono=11

; --- RUTAS ---
RutaMega=D:\MEGA
RutaExamenes=D:\MEGA\8. EXAMENES EN PROCESO

; ============================================
; ESTILOS
; ============================================

[EstiloCaja]
Shape=Rectangle 0,0,#Ancho#,#Alto#,#Radio# | Fill Color #ColorContenedor# | StrokeWidth 0
Y=#PaddingExt#
DynamicVariables=1

[EstiloCajaFila2]
Shape=Rectangle 0,0,#Ancho#,#Alto#,#Radio# | Fill Color #ColorContenedor# | StrokeWidth 0
Y=#Fila2Y#
DynamicVariables=1

[EstiloIcono]
FontFace=#FuenteIconos#
FontSize=#TamIcono#
AntiAlias=1
StringAlign=LeftCenter
Y=(#PaddingExt# + #Alto# / 2 + 2)
DynamicVariables=1

[EstiloIconoFila2]
FontFace=#FuenteIconos#
FontSize=#TamIcono#
AntiAlias=1
StringAlign=LeftCenter
Y=(#Fila2Y# + #Alto# / 2 + 2)
DynamicVariables=1

[EstiloTexto]
FontFace=#Fuente#
FontSize=#TamFuente#
FontColor=#ColorTexto#
AntiAlias=1
StringAlign=LeftCenter
X=5R
Y=(#PaddingExt# + #Alto# / 2)
DynamicVariables=1

[EstiloTextoFila2]
FontFace=#Fuente#
FontSize=#TamFuente#
FontColor=#ColorTexto#
AntiAlias=1
StringAlign=LeftCenter
X=5R
Y=(#Fila2Y# + #Alto# / 2)
DynamicVariables=1

[EstiloBarra]
Shape=Rectangle 25,0,(#Ancho# - 50),2,1 | Fill Color 255,255,255,40 | StrokeWidth 0
Y=(#PaddingExt# + #Alto# - 3)
DynamicVariables=1

[EstiloBarraFila2]
Shape=Rectangle 25,0,(#Ancho# - 50),2,1 | Fill Color 255,255,255,40 | StrokeWidth 0
Y=(#Fila2Y# + #Alto# - 3)
DynamicVariables=1

; ============================================
; FILA 1 - ELEMENTO 01 - ESTUDIOS
; ============================================

[01Caja]
Meter=Shape
MeterStyle=EstiloCaja
X=#PaddingExt#
MouseOverAction=[!SetOption 01Caja Shape "Rectangle 0,0,#Ancho#,#Alto#,#Radio# | Fill Color 85,140,255,150 | StrokeWidth 0"][!SetOption 01Icono FontColor "0,0,0"][!SetOption 01Text FontColor "0,0,0"][!SetOption 01Barra Shape "Rectangle 25,0,(#Ancho# - 50),2,1 | Fill Color #ColorEstudios# | StrokeWidth 0"][!UpdateMeter 01Caja][!UpdateMeter 01Icono][!UpdateMeter 01Text][!UpdateMeter 01Barra][!Redraw]
MouseLeaveAction=[!SetOption 01Caja Shape "Rectangle 0,0,#Ancho#,#Alto#,#Radio# | Fill Color #ColorContenedor# | StrokeWidth 0"][!SetOption 01Icono FontColor "#ColorEstudios#"][!SetOption 01Text FontColor "#ColorTexto#"][!SetOption 01Barra Shape "Rectangle 25,0,(#Ancho# - 50),2,1 | Fill Color 255,255,255,100 | StrokeWidth 0"][!UpdateMeter 01Caja][!UpdateMeter 01Icono][!UpdateMeter 01Text][!UpdateMeter 01Barra][!Redraw]
LeftMouseUpAction=["#RutaMega#\1. ESTUDIOS"]

[01Barra]
Meter=Shape
MeterStyle=EstiloBarra
X=[01Caja:X]

[01Icono]
Meter=String
MeterStyle=EstiloIcono
FontColor=#ColorEstudios#
X=([01Caja:X] + (#Ancho# - ([01Icono:W] + 5 + [01Text:W])) / 2)
Text=[\xE7BE]

[01Text]
Meter=String
MeterStyle=EstiloTexto
Text=ESTUDIOS

; ============================================
; FILA 1 - ELEMENTO 02 - LABORAL
; ============================================

[02Caja]
Meter=Shape
MeterStyle=EstiloCaja
X=([01Caja:X] + #Ancho# + #Espacio#)
MouseOverAction=[!SetOption 02Caja Shape "Rectangle 0,0,#Ancho#,#Alto#,#Radio# | Fill Color 255,140,80,150 | StrokeWidth 0"][!SetOption 02Icono FontColor "0,0,0"][!SetOption 02Text FontColor "0,0,0"][!SetOption 02Barra Shape "Rectangle 25,0,(#Ancho# - 50),2,1 | Fill Color #ColorLaboral# | StrokeWidth 0"][!UpdateMeter 02Caja][!UpdateMeter 02Icono][!UpdateMeter 02Text][!UpdateMeter 02Barra][!Redraw]
MouseLeaveAction=[!SetOption 02Caja Shape "Rectangle 0,0,#Ancho#,#Alto#,#Radio# | Fill Color #ColorContenedor# | StrokeWidth 0"][!SetOption 02Icono FontColor "#ColorLaboral#"][!SetOption 02Text FontColor "#ColorTexto#"][!SetOption 02Barra Shape "Rectangle 25,0,(#Ancho# - 50),2,1 | Fill Color 255,255,255,100 | StrokeWidth 0"][!UpdateMeter 02Caja][!UpdateMeter 02Icono][!UpdateMeter 02Text][!UpdateMeter 02Barra][!Redraw]
LeftMouseUpAction=["#RutaMega#\2. LABORAL"]

[02Barra]
Meter=Shape
MeterStyle=EstiloBarra
X=[02Caja:X]

[02Icono]
Meter=String
MeterStyle=EstiloIcono
FontColor=#ColorLaboral#
X=([02Caja:X] + (#Ancho# - ([02Icono:W] + 5 + [02Text:W])) / 2)
Text=[\xE821]

[02Text]
Meter=String
MeterStyle=EstiloTexto
Text=LABORAL

; ============================================
; FILA 1 - ELEMENTO 03 - CASA
; ============================================

[03Caja]
