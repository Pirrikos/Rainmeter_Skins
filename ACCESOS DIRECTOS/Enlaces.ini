MeterStyle=EstiloCaja
X=([02Caja:X] + #Ancho# + #Espacio#)
MouseOverAction=[!SetOption 03Caja Shape "Rectangle 0,0,#Ancho#,#Alto#,#Radio# | Fill Color 100,220,140,150 | StrokeWidth 0"][!SetOption 03Icono FontColor "0,0,0"][!SetOption 03Text FontColor "0,0,0"][!SetOption 03Barra Shape "Rectangle 25,0,(#Ancho# - 50),2,1 | Fill Color #ColorCasa# | StrokeWidth 0"][!UpdateMeter 03Caja][!UpdateMeter 03Icono][!UpdateMeter 03Text][!UpdateMeter 03Barra][!Redraw]
MouseLeaveAction=[!SetOption 03Caja Shape "Rectangle 0,0,#Ancho#,#Alto#,#Radio# | Fill Color #ColorContenedor# | StrokeWidth 0"][!SetOption 03Icono FontColor "#ColorCasa#"][!SetOption 03Text FontColor "#ColorTexto#"][!SetOption 03Barra Shape "Rectangle 25,0,(#Ancho# - 50),2,1 | Fill Color 255,255,255,100 | StrokeWidth 0"][!UpdateMeter 03Caja][!UpdateMeter 03Icono][!UpdateMeter 03Text][!UpdateMeter 03Barra][!Redraw]
LeftMouseUpAction=["#RutaMega#\3. CASA"]

[03Barra]
Meter=Shape
MeterStyle=EstiloBarra
X=[03Caja:X]

[03Icono]
Meter=String
MeterStyle=EstiloIcono
FontColor=#ColorCasa#
X=([03Caja:X] + (#Ancho# - ([03Icono:W] + 5 + [03Text:W])) / 2)
