MouseLeaveAction=[!SetOption 04Caja Shape "Rectangle 0,0,#Ancho#,#Alto#,#Radio# | Fill Color #ColorContenedor# | StrokeWidth 0"][!SetOption 04Icono FontColor "#ColorOcio#"][!SetOption 04Text FontColor "#ColorTexto#"][!SetOption 04Barra Shape "Rectangle 25,0,(#Ancho# - 50),2,1 | Fill Color 255,255,255,100 | StrokeWidth 0"][!UpdateMeter 04Caja][!UpdateMeter 04Icono][!UpdateMeter 04Text][!UpdateMeter 04Barra][!Redraw]
