FontFace=#FontBody#
FontSize=8
FontColor=76,175,80,180
StringAlign=CenterTop
AntiAlias=1
Text=Update

[MeterUpdateBg]
Meter=Shape
X=#Pad#
Y=(#Block9Y# + #LabelHeight#)
Shape=Rectangle 0,0,#BtnSize#,#BtnSize#,10 | Fill Color 0,0,0,0 | StrokeWidth 0

[MeterUpdateIcon]
Meter=Shape
X=(#Pad# + (#BtnSize#-20)/2)
Y=(#Block9Y# + #LabelHeight# + (#BtnSize#-20)/2)
Shape=Path Path1 | StrokeWidth 2 | Stroke Color 76,175,80,255 | Fill Color 0,0,0,0
Path1=10,1 | LineTo 10,13
Shape2=Path Path2 | StrokeWidth 2 | Stroke Color 76,175,80,255 | Fill Color 0,0,0,0
Path2=5,9 | LineTo 10,14 | LineTo 15,9
Shape3=Path Path3 | StrokeWidth 2 | Stroke Color 76,175,80,255 | Fill Color 0,0,0,0
Path3=3,18 | LineTo 17,18

[MeterUpdateHit]
Meter=Shape
X=#Pad#
Y=#Block9Y#
Shape=Rectangle 0,0,#BtnSize#,(#LabelHeight# + #BtnSize#),10 | Fill Color 255,255,255,0 | StrokeWidth 0
LeftMouseUpAction=[!SetOption MeterUpdateLabel Text "Update x2"][!UpdateMeter MeterUpdateLabel][!Redraw][!Delay 700][!SetOption MeterUpdateLabel Text "Update"][!UpdateMeter MeterUpdateLabel][!Redraw]
LeftMouseDoubleClickAction=["wscript.exe" "C:\Users\pirri\Documents\Rainmeter\Skins\QUICK_ACCESS\@Resources\update.vbs"]
MouseOverAction=[!SetOption MeterUpdateBg Shape "Rectangle 0,0,#BtnSize#,#BtnSize#,10 | Fill Color 76,175,80,#HoverBgAlpha# | StrokeWidth 0"][!SetOption MeterUpdateIcon Shape "Path Path1 | StrokeWidth 2 | Stroke Color 130,220,130,255 | Fill Color 0,0,0,0"][!SetOption MeterUpdateIcon Shape2 "Path Path2 | StrokeWidth 2 | Stroke Color 130,220,130,255 | Fill Color 0,0,0,0"][!SetOption MeterUpdateIcon Shape3 "Path Path3 | StrokeWidth 2 | Stroke Color 130,220,130,255 | Fill Color 0,0,0,0"][!SetOption MeterUpdateLabel FontColor "130,220,130,#HoverLabelAlpha#"][!UpdateMeter MeterUpdateBg][!UpdateMeter MeterUpdateIcon][!UpdateMeter MeterUpdateLabel][!Redraw]
MouseLeaveAction=[!SetOption MeterUpdateBg Shape "Rectangle 0,0,#BtnSize#,#BtnSize#,10 | Fill Color 0,0,0,0 | StrokeWidth 0"][!SetOption MeterUpdateIcon Shape "Path Path1 | StrokeWidth 2 | Stroke Color 76,175,80,255 | Fill Color 0,0,0,0"][!SetOption MeterUpdateIcon Shape2 "Path Path2 | StrokeWidth 2 | Stroke Color 76,175,80,255 | Fill Color 0,0,0,0"][!SetOption MeterUpdateIcon Shape3 "Path Path3 | StrokeWidth 2 | Stroke Color 76,175,80,255 | Fill Color 0,0,0,0"][!SetOption MeterUpdateLabel FontColor "76,175,80,180"][!UpdateMeter MeterUpdateBg][!UpdateMeter MeterUpdateIcon][!UpdateMeter MeterUpdateLabel][!Redraw]

[MeterSep9]
Meter=Shape
X=#Pad#
Y=(#Block10Y# - #BtnSpacing# / 2)
Shape=Rectangle 0,0,#BtnSize#,1,0 | Fill Color 255,255,255,25 | StrokeWidth 0

; ============================================
