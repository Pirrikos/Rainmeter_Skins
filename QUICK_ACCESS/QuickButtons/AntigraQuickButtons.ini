[Rainmeter]
Update=1000
AccurateText=1
Blur=1

[Variables]
@Include=#@#Variables.inc
BtnSize=52
LabelHeight=16
BtnBlock=(#LabelHeight# + #BtnSize#)
BtnSpacing=10
Pad=10
BarWidth=(#Pad# * 2 + #BtnSize#)
BarHeight=(#Pad# + (#BtnBlock# + #BtnSpacing#) * 10 - #BtnSpacing# + #Pad#)
TabWidth=(#BarWidth# - #TabInsetVertical#)
TabX=((#BarWidth# - #TabWidth#) / 2)
TabY=(#BarHeight# - 1)

; Button Y positions (label + icon block)
Block1Y=#Pad#
Block2Y=(#Pad# + #BtnBlock# + #BtnSpacing#)
Block3Y=(#Pad# + (#BtnBlock# + #BtnSpacing#) * 2)
Block4Y=(#Pad# + (#BtnBlock# + #BtnSpacing#) * 3)
Block5Y=(#Pad# + (#BtnBlock# + #BtnSpacing#) * 4)
Block6Y=(#Pad# + (#BtnBlock# + #BtnSpacing#) * 5)
Block7Y=(#Pad# + (#BtnBlock# + #BtnSpacing#) * 6)
Block8Y=(#Pad# + (#BtnBlock# + #BtnSpacing#) * 7)
Block9Y=(#Pad# + (#BtnBlock# + #BtnSpacing#) * 8)
Block10Y=(#Pad# + (#BtnBlock# + #BtnSpacing#) * 9)

; ============================================
; BACKGROUND
; ============================================

[MeterBarBg]
Meter=Shape
Shape=Rectangle 0,0,#BarWidth#,#BarHeight#,12 | Fill Color #ColorBackground# | StrokeWidth 1 | Stroke Color #ColorGlassBorder#

; ============================================
; BTN 1 - NOTAS (orange)
; ============================================

[MeterNotasLabel]
Meter=String
X=(#BarWidth# / 2)
Y=#Block1Y#
FontFace=#FontBody#
FontSize=8
FontColor=255,152,0,180
StringAlign=CenterTop
AntiAlias=1
Text=Alexia

[MeterNotasBg]
Meter=Shape
X=#Pad#
Y=(#Block1Y# + #LabelHeight#)
Shape=Rectangle 0,0,#BtnSize#,#BtnSize#,10 | Fill Color 0,0,0,0 | StrokeWidth 0


[MeterNotasIcon]
Meter=Shape
X=(#Pad# + (#BtnSize#-22)/2)
Y=(#Block1Y# + #LabelHeight# + (#BtnSize#-24)/2)
Shape=Rectangle 0,4,22,20,2 | Fill Color 0,0,0,0 | StrokeWidth 2 | Stroke Color 255,152,0,255
Shape2=Rectangle 6,0,10,6,1 | Fill Color 0,0,0,0 | StrokeWidth 2 | Stroke Color 255,152,0,255
Shape3=Path Path1 | StrokeWidth 2 | Stroke Color 255,152,0,255 | Fill Color 0,0,0,0
Path1=5,10 | LineTo 8,14 | LineTo 17,7

[MeterNotasHit]
Meter=Shape
X=#Pad#
Y=#Block1Y#
Shape=Rectangle 0,0,#BtnSize#,(#LabelHeight# + #BtnSize#),10 | Fill Color 255,255,255,0 | StrokeWidth 0
LeftMouseUpAction=["chrome.exe" "https://luyferivas.com/new/"]
MouseOverAction=[!SetOption MeterNotasBg Shape "Rectangle 0,0,#BtnSize#,#BtnSize#,10 | Fill Color 255,152,0,#HoverBgAlpha# | StrokeWidth 0"][!SetOption MeterNotasIcon Shape "Rectangle 0,4,22,20,2 | Fill Color 0,0,0,0 | StrokeWidth 2 | Stroke Color 255,200,100,255"][!SetOption MeterNotasIcon Shape2 "Rectangle 6,0,10,6,1 | Fill Color 0,0,0,0 | StrokeWidth 2 | Stroke Color 255,200,100,255"][!SetOption MeterNotasIcon Shape3 "Path Path1 | StrokeWidth 2 | Stroke Color 255,200,100,255 | Fill Color 0,0,0,0"][!SetOption MeterNotasLabel FontColor "255,200,100,#HoverLabelAlpha#"][!UpdateMeter MeterNotasBg][!UpdateMeter MeterNotasIcon][!UpdateMeter MeterNotasLabel][!Redraw]
MouseLeaveAction=[!SetOption MeterNotasBg Shape "Rectangle 0,0,#BtnSize#,#BtnSize#,10 | Fill Color 0,0,0,0 | StrokeWidth 0"][!SetOption MeterNotasIcon Shape "Rectangle 0,4,22,20,2 | Fill Color 0,0,0,0 | StrokeWidth 2 | Stroke Color 255,152,0,255"][!SetOption MeterNotasIcon Shape2 "Rectangle 6,0,10,6,1 | Fill Color 0,0,0,0 | StrokeWidth 2 | Stroke Color 255,152,0,255"][!SetOption MeterNotasIcon Shape3 "Path Path1 | StrokeWidth 2 | Stroke Color 255,152,0,255 | Fill Color 0,0,0,0"][!SetOption MeterNotasLabel FontColor "255,152,0,180"][!UpdateMeter MeterNotasBg][!UpdateMeter MeterNotasIcon][!UpdateMeter MeterNotasLabel][!Redraw]

[MeterSep1]
Meter=Shape
X=#Pad#
Y=(#Block2Y# - #BtnSpacing# / 2)
Shape=Rectangle 0,0,#BtnSize#,1,0 | Fill Color 255,255,255,25 | StrokeWidth 0

