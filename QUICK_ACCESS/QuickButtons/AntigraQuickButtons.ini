LeftMouseDoubleClickAction=["wscript.exe" "C:\Users\pirri\Documents\Rainmeter\Skins\ACCESOS DIRECTOS\killer.vbs"]
MouseOverAction=[!SetOption MeterKillerBg Shape "Rectangle 0,0,#BtnSize#,#BtnSize#,10 | Fill Color 200,50,50,#HoverBgAlpha# | StrokeWidth 0"][!SetOption MeterKillerIcon Shape "Path Path1 | StrokeWidth 2 | Stroke Color 255,100,100,255 | Fill Color 0,0,0,0"][!SetOption MeterKillerIcon Shape2 "Path Path2 | StrokeWidth 2 | Stroke Color 255,100,100,255 | Fill Color 0,0,0,0"][!SetOption MeterKillerLabel FontColor "255,100,100,#HoverLabelAlpha#"][!UpdateMeter MeterKillerBg][!UpdateMeter MeterKillerIcon][!UpdateMeter MeterKillerLabel][!Redraw]
MouseLeaveAction=[!SetOption MeterKillerBg Shape "Rectangle 0,0,#BtnSize#,#BtnSize#,10 | Fill Color 0,0,0,0 | StrokeWidth 0"][!SetOption MeterKillerIcon Shape "Path Path1 | StrokeWidth 2 | Stroke Color 200,50,50,255 | Fill Color 0,0,0,0"][!SetOption MeterKillerIcon Shape2 "Path Path2 | StrokeWidth 2 | Stroke Color 200,50,50,255 | Fill Color 0,0,0,0"][!SetOption MeterKillerLabel FontColor "200,50,50,180"][!UpdateMeter MeterKillerBg][!UpdateMeter MeterKillerIcon][!UpdateMeter MeterKillerLabel][!Redraw]

; ============================================
; TOGGLE TAB - SWITCH TO HORIZONTAL
; ============================================

[MeterSwitchTabBg]
Meter=Shape
X=#TabX#
Y=#TabY#
Shape=Rectangle 0,0,#TabWidth#,#TabHeight#,#TabRadius# | Fill Color #ColorBackground# | StrokeWidth 1 | Stroke Color #ColorGlassBorder#

[MeterSwitchTabLabel]
Meter=String
X=(#TabX# + #TabWidth# / 2)
Y=(#TabY# + #TabLabelYOffset#)
FontFace=#FontBody#
FontSize=8
FontColor=#TabLabelBase#
StringAlign=CenterTop
AntiAlias=1
Text=Horizontal

[MeterSwitchTabHit]
Meter=Shape
X=#TabX#
Y=#TabY#
Shape=Rectangle 0,0,#TabWidth#,#TabHeight#,#TabRadius# | Fill Color 255,255,255,0 | StrokeWidth 0
LeftMouseUpAction=[!DeactivateConfig "QUICK_ACCESS\QuickButtons" "AntigraQuickButtons.ini"][!ActivateConfig "QUICK_ACCESS\QuickButtonsH" "AntigraQuickButtonsH.ini"]
MouseOverAction=[!SetOption MeterSwitchTabBg Shape "Rectangle 0,0,#TabWidth#,#TabHeight#,#TabRadius# | Fill Color #ColorBackground# | StrokeWidth 1 | Stroke Color #TabStrokeHover#"][!SetOption MeterSwitchTabLabel FontColor "#TabLabelHover#"][!UpdateMeter MeterSwitchTabBg][!UpdateMeter MeterSwitchTabLabel][!Redraw]
MouseLeaveAction=[!SetOption MeterSwitchTabBg Shape "Rectangle 0,0,#TabWidth#,#TabHeight#,#TabRadius# | Fill Color #ColorBackground# | StrokeWidth 1 | Stroke Color #ColorGlassBorder#"][!SetOption MeterSwitchTabLabel FontColor "#TabLabelBase#"][!UpdateMeter MeterSwitchTabBg][!UpdateMeter MeterSwitchTabLabel][!Redraw]
