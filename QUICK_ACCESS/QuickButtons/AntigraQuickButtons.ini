Path1=3,3 | LineTo 17,17
Shape2=Path Path2 | StrokeWidth 2 | Stroke Color 200,50,50,255 | Fill Color 0,0,0,0
Path2=17,3 | LineTo 3,17

[MeterKillerHit]
