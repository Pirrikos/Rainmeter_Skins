MouseLeaveAction=[!SetOption MeterToggleNormal Shape "Rectangle 0,0,14,4,1 | Fill Color 255,255,255,100 | StrokeWidth 0"][!SetOption MeterToggleNormal Shape2 "Rectangle 0,8,14,4,1 | Fill Color 255,255,255,100 | StrokeWidth 0"][!UpdateMeter *][!Redraw]

