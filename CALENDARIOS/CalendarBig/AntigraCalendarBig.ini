[Rainmeter]
Update=1000
AccurateText=1
OnRefreshAction=[!CommandMeasure MeasureDownloadCalendar "Run"][!CommandMeasure MeasureLuaBig "Initialize()"]

[MeasureMidnight]
Measure=Time
Format=%d
OnChangeAction=[!Refresh]

[Variables]
@Include=#@#Variables.inc
SkinWidth=710
SkinHeight=870
GridX=18
GridY=70
IconX=220

; --- STYLES ---

[StyleDayHeader]
FontFace=#FontHeader#
FontSize=9
FontWeight=700
FontColor=#CalHeaderText#
StringAlign=Center
AntiAlias=1

[StyleDayCell]
FontFace=#FontBody#
FontSize=12
FontColor=#CalDayText#
StringAlign=Center
AntiAlias=1

[StyleEventText]
FontFace=#FontBody#
FontSize=8
FontColor=255,255,255,170
StringAlign=Left
AntiAlias=1
ClipString=1
W=84
DynamicVariables=1

[StyleDayHit]
Shape=Rectangle #CalBig_HitX#,#CalBig_HitY#,#CalBig_HitW#,#CalBig_HitH#,#CalBig_HitR# | Fill Color #CalHitIdleFill# | StrokeWidth 0
MouseOverAction=[!SetOption #CURRENTSECTION# Shape "Rectangle #CalBig_HitX#,#CalBig_HitY#,#CalBig_HitW#,#CalBig_HitH#,#CalBig_HitR# | Fill Color #CalHitHoverFill# | StrokeWidth 1 | Stroke Color #CalHitHoverStroke#"][!UpdateMeter #CURRENTSECTION#][!Redraw]
MouseLeaveAction=[!SetOption #CURRENTSECTION# Shape "Rectangle #CalBig_HitX#,#CalBig_HitY#,#CalBig_HitW#,#CalBig_HitH#,#CalBig_HitR# | Fill Color #CalHitIdleFill# | StrokeWidth 0"][!UpdateMeter #CURRENTSECTION#][!Redraw]
DynamicVariables=1

; --- MEASURES ---

; --- Google Calendar Auto-Download ---
[MeasureCalendarUpdate]
Measure=Calc
Formula=1
UpdateDivider=#UpdateIntervalCalendar#
IfCondition=1
IfTrueAction=[!CommandMeasure MeasureDownloadCalendar "Run"]

[MeasureDownloadCalendar]
Measure=Plugin
Plugin=RunCommand
Program=PowerShell
Parameter=-NoProfile -ExecutionPolicy Bypass -Command "Invoke-WebRequest -Uri '#CalendarURL#' -OutFile '#@#Calendar.ics'"
State=Hide
FinishAction=[!CommandMeasure MeasureLuaBig "Parse()"][!UpdateMeter *][!Redraw]

[MeasureLuaBig]
Measure=Script
ScriptFile=#@#GridCalendarBig.lua
UpdateDivider=-1

; --- METERS ---

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,#SkinWidth#,#SkinHeight#,15 | Fill Color #ColorBackground# | StrokeWidth 1 | Stroke Color #ColorGlassBorder#

[MeterMonthYear]
Meter=String
FontFace=#FontHeader#
FontSize=11
FontWeight=700
FontColor=200,200,200
AntiAlias=1
X=(#SkinWidth#/2)
Y=25
StringAlign=Center
Text="CALENDARIO"
DynamicVariables=1

[MeterPrevMonth]
Meter=Shape
X=120
Y=#CalBig_TopBarY#
Shape=Path Arrow | StrokeWidth 2 | Stroke Color #CalIconIdle# | Fill Color 0,0,0,0
Arrow=12,0 | LineTo 0,8 | LineTo 12,16
LeftMouseUpAction=[!CommandMeasure MeasureLuaBig "ChangeMonth(-1)"][!UpdateMeter *][!Redraw]
MouseOverAction=[!SetOption MeterPrevMonth Shape "Path Arrow | StrokeWidth 2 | Stroke Color #CalIconHover# | Fill Color 0,0,0,0"][!UpdateMeter *][!Redraw]
MouseLeaveAction=[!SetOption MeterPrevMonth Shape "Path Arrow | StrokeWidth 2 | Stroke Color #CalIconIdle# | Fill Color 0,0,0,0"][!UpdateMeter *][!Redraw]

[MeterNextMonth]
Meter=Shape
X=590
Y=#CalBig_TopBarY#
Shape=Path Arrow | StrokeWidth 2 | Stroke Color #CalIconIdle# | Fill Color 0,0,0,0
Arrow=0,0 | LineTo 12,8 | LineTo 0,16
LeftMouseUpAction=[!CommandMeasure MeasureLuaBig "ChangeMonth(1)"][!UpdateMeter *][!Redraw]
MouseOverAction=[!SetOption MeterNextMonth Shape "Path Arrow | StrokeWidth 2 | Stroke Color #CalIconHover# | Fill Color 0,0,0,0"][!UpdateMeter *][!Redraw]
MouseLeaveAction=[!SetOption MeterNextMonth Shape "Path Arrow | StrokeWidth 2 | Stroke Color #CalIconIdle# | Fill Color 0,0,0,0"][!UpdateMeter *][!Redraw]

; --- COUNTDOWN TOGGLE BUTTON ---
[MeterCountdownToggle]
Meter=Shape
X=(#SkinWidth#-#CalBig_RightPad#-18)
Y=#CalBig_TopBarY#
Shape=Ellipse 9,9,8,8 | StrokeWidth 2 | Stroke Color #CalIconIdle# | Fill Color 0,0,0,0
Shape2=Line 9,4,9,9 | StrokeWidth 2 | Stroke Color #CalIconIdle#
LeftMouseUpAction=[!ToggleConfig "CUENTA ATRAS\Countdown" "AntigraCountdown.ini"]
MouseOverAction=[!SetOption MeterCountdownToggle Shape "Ellipse 9,9,8,8 | StrokeWidth 2 | Stroke Color #CalIconHover# | Fill Color 0,0,0,0"][!SetOption MeterCountdownToggle Shape2 "Line 9,4,9,9 | StrokeWidth 2 | Stroke Color #CalIconHover#"][!UpdateMeter *][!Redraw]
MouseLeaveAction=[!SetOption MeterCountdownToggle Shape "Ellipse 9,9,8,8 | StrokeWidth 2 | Stroke Color #CalIconIdle# | Fill Color 0,0,0,0"][!SetOption MeterCountdownToggle Shape2 "Line 9,4,9,9 | StrokeWidth 2 | Stroke Color #CalIconIdle#"][!UpdateMeter *][!Redraw]

[MeterNotesButtonBig]
Meter=Shape
X=#CalBig_LeftPad#
Y=#CalBig_TopBarY#
Shape=Rectangle 0,0,18,18,3 | Fill Color 255,235,59,200 | StrokeWidth 0
Shape2=Line 4,6,14,6 | StrokeWidth 1 | Stroke Color 120,100,0,180
Shape3=Line 4,10,14,10 | StrokeWidth 1 | Stroke Color 120,100,0,180
Shape4=Line 4,14,12,14 | StrokeWidth 1 | Stroke Color 120,100,0,180
LeftMouseUpAction=["explorer.exe" "shell:AppsFolder\Microsoft.MicrosoftStickyNotes_8wekyb3d8bbwe!App"]
MouseOverAction=[!SetOption MeterNotesButtonBig Shape "Rectangle 0,0,18,18,3 | Fill Color 255,245,100,255 | StrokeWidth 0"][!UpdateMeter *][!Redraw]
MouseLeaveAction=[!SetOption MeterNotesButtonBig Shape "Rectangle 0,0,18,18,3 | Fill Color 255,235,59,200 | StrokeWidth 0"][!UpdateMeter *][!Redraw]

; Headers
[MeterHeaderBackground]
Meter=Shape
Shape=Rectangle 30,60,650,24,12 | Fill Color #CalHeaderBg# | StrokeWidth 0
X=0
Y=0

[H_L]
Meter=String
MeterStyle=StyleDayHeader
X=(#CalBig_ColStart#)
Y=65
Text="L"
[H_M]
Meter=String
MeterStyle=StyleDayHeader
X=(#CalBig_ColStart#+#CalBig_ColSpacing#)
Y=65
Text="M"
[H_X]
Meter=String
MeterStyle=StyleDayHeader
X=(#CalBig_ColStart#+#CalBig_ColSpacing#*2)
Y=65
Text="X"
[H_J]
Meter=String
MeterStyle=StyleDayHeader
X=(#CalBig_ColStart#+#CalBig_ColSpacing#*3)
Y=65
Text="J"
[H_V]
Meter=String
MeterStyle=StyleDayHeader
X=(#CalBig_ColStart#+#CalBig_ColSpacing#*4)
Y=65
Text="V"
[H_S]
Meter=String
MeterStyle=StyleDayHeader
X=(#CalBig_ColStart#+#CalBig_ColSpacing#*5)
Y=65
Text="S"
FontColor=#CalWeekendHeader#
[H_D]
Meter=String
MeterStyle=StyleDayHeader
X=(#CalBig_ColStart#+#CalBig_ColSpacing#*6)
Y=65
Text="D"
FontColor=#CalWeekendHeader#

