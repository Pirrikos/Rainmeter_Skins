; --- SIZE TOGGLE BUTTONS ---

; Apps toggle (center) - grid icon 18x18
[MeterAppsToggle]
Meter=Shape
X=((#SkinWidth#/2)-9)
Y=840
Shape=Rectangle 0,0,8,8,1 | Fill Color 255,255,255,100 | StrokeWidth 0
Shape2=Rectangle 10,0,8,8,1 | Fill Color 255,255,255,100 | StrokeWidth 0
Shape3=Rectangle 0,10,8,8,1 | Fill Color 255,255,255,100 | StrokeWidth 0
Shape4=Rectangle 10,10,8,8,1 | Fill Color 255,255,255,100 | StrokeWidth 0
LeftMouseUpAction=[!ToggleConfig "QUICK_ACCESS\QuickButtons" "AntigraQuickButtons.ini"]
MouseOverAction=[!SetOption MeterAppsToggle Shape "Rectangle 0,0,8,8,1 | Fill Color #ColorAccent# | StrokeWidth 0"][!SetOption MeterAppsToggle Shape2 "Rectangle 10,0,8,8,1 | Fill Color #ColorAccent# | StrokeWidth 0"][!SetOption MeterAppsToggle Shape3 "Rectangle 0,10,8,8,1 | Fill Color #ColorAccent# | StrokeWidth 0"][!SetOption MeterAppsToggle Shape4 "Rectangle 10,10,8,8,1 | Fill Color #ColorAccent# | StrokeWidth 0"][!UpdateMeter *][!Redraw]
MouseLeaveAction=[!SetOption MeterAppsToggle Shape "Rectangle 0,0,8,8,1 | Fill Color 255,255,255,100 | StrokeWidth 0"][!SetOption MeterAppsToggle Shape2 "Rectangle 10,0,8,8,1 | Fill Color 255,255,255,100 | StrokeWidth 0"][!SetOption MeterAppsToggle Shape3 "Rectangle 0,10,8,8,1 | Fill Color 255,255,255,100 | StrokeWidth 0"][!SetOption MeterAppsToggle Shape4 "Rectangle 10,10,8,8,1 | Fill Color 255,255,255,100 | StrokeWidth 0"][!UpdateMeter *][!Redraw]

