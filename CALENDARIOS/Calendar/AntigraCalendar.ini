[Rainmeter]
Update=1000
AccurateText=1
OnRefreshAction=[!CommandMeasure MeasureDownloadCalendar "Run"][!CommandMeasure MeasureLuaGrid "Initialize()"]

[MeasureMidnight]
Measure=Time
Format=%d
OnChangeAction=[!Refresh]

[Variables]
@Include=#@#Variables.inc
SkinWidth=340
SkinHeight=580
GridX=18
GridY=70
IconX=220

; --- STYLES ---

[StyleDayHeader]
FontFace=#FontHeader#
FontSize=9
FontWeight=700
FontColor=#CalHeaderText#
StringAlign=Center
AntiAlias=1

[StyleDayCell]
FontFace=#FontBody#
FontSize=12
FontColor=#CalDayText#
StringAlign=Center
AntiAlias=1

[StyleListText]
FontFace=#FontBody#
FontSize=12
FontColor=255,255,255,205
StringAlign=Left
AntiAlias=1
ClipString=1
W=200
DynamicVariables=1

[StyleDayHit]
Shape=Rectangle #CalSmall_HitX#,#CalSmall_HitY#,#CalSmall_HitW#,#CalSmall_HitH#,#CalSmall_HitR# | Fill Color #CalHitIdleFill# | StrokeWidth 0
MouseOverAction=[!SetOption #CURRENTSECTION# Shape "Rectangle #CalSmall_HitX#,#CalSmall_HitY#,#CalSmall_HitW#,#CalSmall_HitH#,#CalSmall_HitR# | Fill Color #CalHitHoverFill# | StrokeWidth 1 | Stroke Color #CalHitHoverStroke#"][!UpdateMeter #CURRENTSECTION#][!Redraw]
MouseLeaveAction=[!SetOption #CURRENTSECTION# Shape "Rectangle #CalSmall_HitX#,#CalSmall_HitY#,#CalSmall_HitW#,#CalSmall_HitH#,#CalSmall_HitR# | Fill Color #CalHitIdleFill# | StrokeWidth 0"][!UpdateMeter #CURRENTSECTION#][!Redraw]
DynamicVariables=1

; --- MEASURES ---

; --- Google Calendar Auto-Download ---
[MeasureCalendarUpdate]
Measure=Calc
Formula=1
UpdateDivider=#UpdateIntervalCalendar#
IfCondition=1
IfTrueAction=[!CommandMeasure MeasureDownloadCalendar "Run"]

[MeasureDownloadCalendar]
Measure=Plugin
Plugin=RunCommand
Program=PowerShell
Parameter=-NoProfile -ExecutionPolicy Bypass -Command "Invoke-WebRequest -Uri '#CalendarURL#' -OutFile '#@#Calendar.ics'"
State=Hide
FinishAction=[!CommandMeasure MeasureLuaGrid "Parse()"][!UpdateMeter *][!Redraw]

[MeasureLuaGrid]
Measure=Script
ScriptFile=#@#GridCalendar.lua
UpdateDivider=-1

; --- METERS ---

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,#SkinWidth#,#SkinHeight#,15 | Fill Color #ColorBackground# | StrokeWidth 1 | Stroke Color #ColorGlassBorder#
Shape2=Line 25,415,315,415 | Stroke Color 255,255,255,30 | StrokeWidth 1

[MeterMonthYear]
Meter=String
FontFace=#FontHeader#
FontSize=11
FontWeight=700
FontColor=200,200,200
AntiAlias=1
X=(#SkinWidth#/2)
Y=25
StringAlign=Center
Text="CALENDARIO"
DynamicVariables=1

[MeterPrevMonth]
Meter=Shape
X=60
Y=#CalSmall_TopBarY#
Shape=Path Arrow | StrokeWidth 2 | Stroke Color #CalIconIdle# | Fill Color 0,0,0,0
Arrow=8,0 | LineTo 0,5 | LineTo 8,10
LeftMouseUpAction=[!CommandMeasure MeasureLuaGrid "ChangeMonth(-1)"][!UpdateMeter *][!Redraw]
MouseOverAction=[!SetOption MeterPrevMonth Shape "Path Arrow | StrokeWidth 2 | Stroke Color #CalIconHover# | Fill Color 0,0,0,0"][!UpdateMeter *][!Redraw]
MouseLeaveAction=[!SetOption MeterPrevMonth Shape "Path Arrow | StrokeWidth 2 | Stroke Color #CalIconIdle# | Fill Color 0,0,0,0"][!UpdateMeter *][!Redraw]

[MeterNextMonth]
Meter=Shape
X=280
Y=#CalSmall_TopBarY#
Shape=Path Arrow | StrokeWidth 2 | Stroke Color #CalIconIdle# | Fill Color 0,0,0,0
Arrow=0,0 | LineTo 8,5 | LineTo 0,10
LeftMouseUpAction=[!CommandMeasure MeasureLuaGrid "ChangeMonth(1)"][!UpdateMeter *][!Redraw]
MouseOverAction=[!SetOption MeterNextMonth Shape "Path Arrow | StrokeWidth 2 | Stroke Color #CalIconHover# | Fill Color 0,0,0,0"][!UpdateMeter *][!Redraw]
MouseLeaveAction=[!SetOption MeterNextMonth Shape "Path Arrow | StrokeWidth 2 | Stroke Color #CalIconIdle# | Fill Color 0,0,0,0"][!UpdateMeter *][!Redraw]

; --- COUNTDOWN TOGGLE BUTTON ---
[MeterCountdownToggle]
Meter=Shape
X=310
Y=#CalSmall_TopBarY#
Shape=Ellipse 7,7,6,6 | StrokeWidth 2 | Stroke Color #CalIconIdle# | Fill Color 0,0,0,0
Shape2=Line 7,3,7,7 | StrokeWidth 2 | Stroke Color #CalIconIdle#
LeftMouseUpAction=[!ToggleConfig "CUENTA ATRAS\Countdown" "AntigraCountdown.ini"]
MouseOverAction=[!SetOption MeterCountdownToggle Shape "Ellipse 7,7,6,6 | StrokeWidth 2 | Stroke Color #CalIconHover# | Fill Color 0,0,0,0"][!SetOption MeterCountdownToggle Shape2 "Line 7,3,7,7 | StrokeWidth 2 | Stroke Color #CalIconHover#"][!UpdateMeter *][!Redraw]
MouseLeaveAction=[!SetOption MeterCountdownToggle Shape "Ellipse 7,7,6,6 | StrokeWidth 2 | Stroke Color #CalIconIdle# | Fill Color 0,0,0,0"][!SetOption MeterCountdownToggle Shape2 "Line 7,3,7,7 | StrokeWidth 2 | Stroke Color #CalIconIdle#"][!UpdateMeter *][!Redraw]

[MeterNotesButton]
Meter=Shape
X=#CalSmall_LeftPad#
Y=#CalSmall_TopBarY#
Shape=Rectangle 0,0,14,14,2 | Fill Color 255,235,59,200 | StrokeWidth 0
Shape2=Line 3,5,11,5 | StrokeWidth 1 | Stroke Color 120,100,0,180
Shape3=Line 3,8,11,8 | StrokeWidth 1 | Stroke Color 120,100,0,180
Shape4=Line 3,11,9,11 | StrokeWidth 1 | Stroke Color 120,100,0,180
LeftMouseUpAction=["explorer.exe" "shell:AppsFolder\Microsoft.MicrosoftStickyNotes_8wekyb3d8bbwe!App"]
MouseOverAction=[!SetOption MeterNotesButton Shape "Rectangle 0,0,14,14,2 | Fill Color 255,245,100,255 | StrokeWidth 0"][!UpdateMeter *][!Redraw]
MouseLeaveAction=[!SetOption MeterNotesButton Shape "Rectangle 0,0,14,14,2 | Fill Color 255,235,59,200 | StrokeWidth 0"][!UpdateMeter *][!Redraw]

; Headers
[MeterHeaderBackground]
Meter=Shape
Shape=Rectangle 20,60,300,24,12 | Fill Color #CalHeaderBg# | StrokeWidth 0
X=0
Y=0

[H_L]
Meter=String
MeterStyle=StyleDayHeader
X=(#CalSmall_ColStart#)
Y=65
Text="L"
[H_M]
Meter=String
MeterStyle=StyleDayHeader
X=(#CalSmall_ColStart#+#CalSmall_ColSpacing#)
Y=65
Text="M"
[H_X]
Meter=String
MeterStyle=StyleDayHeader
X=(#CalSmall_ColStart#+#CalSmall_ColSpacing#*2)
Y=65
Text="X"
[H_J]
Meter=String
MeterStyle=StyleDayHeader
X=(#CalSmall_ColStart#+#CalSmall_ColSpacing#*3)
Y=65
Text="J"
[H_V]
Meter=String
MeterStyle=StyleDayHeader
X=(#CalSmall_ColStart#+#CalSmall_ColSpacing#*4)
Y=65
Text="V"
[H_S]
Meter=String
MeterStyle=StyleDayHeader
X=(#CalSmall_ColStart#+#CalSmall_ColSpacing#*5)
Y=65
Text="S"
FontColor=#CalWeekendHeader#
[H_D]
Meter=String
MeterStyle=StyleDayHeader
X=(#CalSmall_ColStart#+#CalSmall_ColSpacing#*6)
Y=65
Text="D"
FontColor=#CalWeekendHeader#

